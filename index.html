<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/lagarto.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d0f0c" />
    <title>ComandK | Elite Tactical Fitness</title>
  </head>
  <body>
    <!-- App Container -->
    <div id="app">
      
      <!-- AUTH / LANDING VIEW -->
      <section id="auth-view" style="display: flex; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem;">
         <!-- Vídeo integrado transparente usando mix-blend-mode (CSS) -->
         <video src="/src/assets/lagarto.mp4" autoplay loop muted playsinline class="mascot-video" style="max-height: 250px; margin-bottom: 1rem;"></video>
         <h1 class="glow-text" style="font-size: 2.2rem; line-height: 1.2; margin-bottom: 0.5rem;">¿Preparado para el cambio?</h1>
         <h2 style="font-size: 2.5rem; color: white; margin-bottom: 1.5rem; text-transform: uppercase;">¡Vamos allá!</h2>
         <p class="label-sm" style="opacity: 0.6; margin-bottom: 3rem;">IDENTIFICACIÓN TÁCTICA REQUERIDA PARA ACCEDER</p>
         
         <div style="width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 1rem;">
            <button id="btn-login-google" class="glow-box" style="background: white; color: black; border: none; padding: 1.2rem; font-family: var(--font-header); font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 0.8rem; text-transform: uppercase;">
               <svg style="width: 24px;" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path></svg>
               Entrar con Google
            </button>
            <button id="btn-login-demo" class="glass" style="background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 1.2rem; font-family: var(--font-header); font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase;">
               ACCESO INVITADO (DEMO)
            </button>
         </div>
         <p id="auth-error-msg" style="color: #ff3333; margin-top: 1.5rem; font-size: 0.8rem; display: none;"></p>
      </section>

      <!-- Authenticated App Shell -->
      <div id="app-shell" style="display: none; height: 100vh; flex-direction: column;">
        <div id="modal-outlet"></div>
        <!-- Top Navigation/Header -->
      <header id="top-nav" class="glass-tactical" style="padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: none; position: sticky; top: 0; z-index: 200;">
        <div style="flex: 1;">
          <span class="label-sm" id="label-system-status" style="display: block; opacity: 0.6;">SYSTEM STATUS: OPTIMAL</span>
          <div style="display: flex; align-items: center; gap: 0.8rem;">
            <img src="/src/assets/lagarto.png" alt="ComandK Logo" style="width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 5px var(--primary-color));" />
            <h1 id="app-title" style="font-size: 1.2rem; margin-top: -0.2rem;" class="glow-text">COMANDK</h1>
          </div>
        </div>

        <div style="display: flex; align-items: center; gap: 1rem;">
          <div id="lang-switcher" class="label-sm" style="cursor: pointer; padding: 0.5rem; border: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center;">
             <span id="lang-toggle-btn">ES | EN</span>
          </div>
          <div id="user-profile" style="width: 40px; height: 40px; border: 1px solid var(--primary-color); padding: 2px;">
             <div style="background-color: var(--surface-bright); width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
             </div>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main id="content-outlet"></main>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav glass" style="border-top: 1px solid var(--glass-border);">
        <a href="#dashboard" class="nav-item active" data-nav="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <span id="nav-hud">HUD</span>
        </a>
        <a href="#workouts" class="nav-item" data-nav="workouts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v8H2z"></path><line x1="6" y1="8" x2="6" y2="16"></line><line x1="10" y1="8" x2="10" y2="16"></line></svg>
          <span id="nav-ops">OPS</span>
        </a>
        <a href="#nutrition" class="nav-item" data-nav="nutrition">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M11 2a2 2 0 0 0-2 2v5H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h5v5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-5h5a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-5V4a2 2 0 0 0-2-2z"></path></svg>
          <span id="nav-fuel">FUEL</span>
        </a>
        <a href="#progress" class="nav-item" data-nav="progress">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
          <span id="nav-intel">INTEL</span>
        </a>
      </nav>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
